name: Check CED for Changes

on:
  schedule:
    - cron: "0 17 * * *"   # daily at 17:00 UTC (1:00 AM Beijing)
  workflow_dispatch:        # manual trigger via GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 runtime

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # push commits back to the repo
      issues: write     # create issues for change notifications

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run CED check script
        id: check
        run: python check.py

      - name: Commit and push changes
        run: |
          git config user.name "CED Monitor Bot"
          git config user.email "bot@ced-monitor.github.io"
          git add data/ diffs/
          git diff --staged --quiet || git commit -m "CED updated: $(date -u +%Y-%m-%d)"
          git push

      - name: Create GitHub issue notification
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const diffPath = `${{ steps.check.outputs.diff_image }}`;
            const diffLink = `https://github.com/${context.repo.owner}/${context.repo.repo}/tree/main/diffs`;
            const historyLink = `https://github.com/${context.repo.owner}/${context.repo.repo}/commits/main`;

            const body = [
              `The AP Cybersecurity CED PDF changed on **${today}**.`,
              ``,
              `📄 [View diff images](${diffLink})`,
              `📜 [View commit history](${historyLink})`,
              diffPath ? `\n🖼️ Diff saved to: \`${diffPath}\`` : '',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 AP Cybersecurity CED changed: ${today}`,
              body,
              labels: [],
            });
